apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: notification-service:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: notification-configmap
              key: PORT
        - name: MONGO_URI
          valueFrom:
            configMapKeyRef:
              name: notification-configmap
              key: MONGO_URI
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
