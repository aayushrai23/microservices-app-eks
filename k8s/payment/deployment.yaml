apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: payment-service:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: payment-configmap
              key: PORT
        - name: MONGO_URI
          valueFrom:
            configMapKeyRef:
              name: payment-configmap
              key: MONGO_URI
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: payment-configmap
              key: AUTH_SERVICE_URL
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: payment-configmap
              key: NOTIFICATION_SERVICE_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
